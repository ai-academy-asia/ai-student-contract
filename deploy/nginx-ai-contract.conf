# ── AI Academy гэрээний апп — nginx ────────────────────────────────────────────
#
# ЭНЭ БЛОКИЙГ /etc/nginx/conf.d/ai-academy.asia.ssl.conf доторх
#   server { listen 443 ssl; server_name ai-academy.asia ...; }
# блокийн `location / { ... }` (Next.js, 3000)-ийн ДЭЭР эсвэл хажууд нэмнэ.
#
# Анхаар:
#   • Порт 8000 нь танай Node.js backend-д аль хэдийн эзлэгдсэн тул гэрээний апп
#     ӨӨР порт (жишээ 8090) дээр ажиллана (systemd-д мөн адил тохируулна).
#   • `proxy_pass`-д ЗААВАЛ trailing slash БАЙХГҮЙ — `/contract/...` зам бүтнээрээ
#     FastAPI руу дамжина (апп өөрөө `/contract` угтвар дор сонсдог).
#   • Гэрээний апп `/contract/_api/*`, `/contract/_static/*` ашигладаг тул танай
#     `/api/`, `/auth/`, `/payment/` зэрэгтэй мөргөлдөхгүй.

location ^~ /contract/ {
    proxy_pass http://127.0.0.1:8090;          # ← trailing slash БАЙХГҮЙ!
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    # client_max_body_size 443-блокт аль хэдийн 50m тул хангалттай.
}
